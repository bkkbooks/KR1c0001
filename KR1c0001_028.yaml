body:
  text: 周頌閔豫小子之什第三閔豫小子閔豫小子嗣王朝於廟也閔豫小子遭家不造嬛嬛在疚於乎皇考永世克孝念茲皇祖陟降庭止維豫小子夙夜敬止於乎皇王繼序思不忘閔豫小子一章十一句訪落訪落嗣王謀於廟也訪豫落止率時昭考於乎悠哉朕未有艾將豫就之繼猶判渙維豫小子未堪家多難紹庭上下陟降厥家休矣皇考以保明其身訪落一章十二句敬之敬之群臣進戒嗣王也敬之敬之天維顯思命不易哉無曰高高在上陟降厥士日監在茲維豫小子不聰敬止日就月將學有緝熙于光明佛時仔肩示我顯德行敬之一章十二句小毖小毖嗣王求助也豫其懲而毖後患莫豫荓蜂自求辛螫肇允彼桃蟲拚飛維鳥未堪家多難豫又集于蓼小毖一章八句載芟載芟春籍田而祈社稷也載芟載柞其耕澤澤千耦其耘徂隰徂畛侯主侯伯侯亞侯旅侯彊侯以有嗿其饁思媚其婦有依其士有略其耜俶載南畝播厥百穀實函斯活驛驛其達有厭其傑厭厭其苗綿綿其麃載穫濟濟有實其積萬億及秭為酒為醴蒸畀祖妣以洽百禮有飶其香邦家之光有椒其馨胡考之寧匪且有且匪今斯今振古如茲載芟一章三十一句良耜良耜秋報社稷也畟畟良耜俶載南畝播厥百穀實函斯活或來瞻女載筐及筥其餉伊黍其笠伊糾其鎛斯趙以薅荼蓼荼蓼朽止黍稷茂止穫之挃挃積之栗栗其崇如墉其比如櫛以開百室百室盈止婦子寧止殺時犉牡有救其角以似以續續古之人良耜一章二十三句絲衣絲衣繹賓尸也高子曰靈星之尸也絲衣其紑載辨俅俅自堂徂基自羊徂牛鼐鼎及鼒兕觥其觩旨酒思柔不吳不敖胡考之休絲衣一章九句酌酌告成大武也言能酌先祖之道以養天下也於鑠王師遵養時晦時純熙矣是用大介我龍受之蹻蹻王之造載用有嗣實維爾公允師酌一章九句桓桓講武類禡也桓武志也綏萬邦婁豐年天命匪解桓桓武王保有厥士于以四方克定厥家於昭于天皇以間之桓一章九句賚賚大封於廟也賚豫也言所以錫豫善人也文王既勤止我應受之敷時繹思我徂維求定時周之命於繹思賚一章六句般般巡守而祀四嶽河海也於皇時周陟其高山嶞山喬嶽允猶翕河敷天之下裒時之對時周之命般一章七句閔豫小子之什十一篇十一章百三十七句
