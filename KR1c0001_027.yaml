body:
  text: 周頌臣工之什第二臣工臣工諸侯助祭遣於廟也嗟嗟臣工敬爾在公王釐爾成來咨來茹嗟嗟保介維莫之春亦又何求如何新畬於皇來牟將受厥明明昭上帝迄用康年命我衆人庤乃錢鎛奄觀銍艾臣工一章十五句噫嘻噫嘻春夏祈穀于上帝也噫嘻成王既昭假爾率時農夫播厥百穀駿發爾私終三十里亦服爾耕十千維耦噫嘻一章八句振鷺振鷺二王之後來助祭也振鷺于飛于彼西雍我客戾止亦有斯容在彼無惡在此無斁庶幾夙夜以永終譽振鷺一章八句豐年豐年秋冬報也豐年多黍多稌亦有高廩萬億及秭為酒為醴蒸畀祖妣以洽百禮降福孔皆豐年一章七句有瞽有瞽始作樂而合乎祖也有瞽有瞽在周之庭設業設虡崇牙樹羽應田縣鼓鞉磬柷圉既備乃奏簫管備舉喤喤厥聲肅雍和鳴先祖是聽我客戾止永觀厥成有瞽一章十三句潛潛季冬薦魚春獻鮪也猗與漆沮潛有多魚有鱣有鮪鰷鱨鰋鯉以享以祀以介景福潛一章六句雍雍禘大祖也有來雍雍至止肅肅相維辟公天子穆穆於薦廣牡相豫肆祀假哉皇考綏豫孝子宣哲維人文武維后燕及皇天克昌厥後綏我眉壽介以繁祉既右烈考亦右文母雍一章十六句載見載見諸侯始見乎武王廟也載見辟王曰求厥章龍旗陽陽和鈴央央鞗革有鶬休有烈光率見昭考以孝以享以介眉壽永言保之思皇多祜烈文辟公綏以多福俾緝熙于純嘏載見一章十四句有客有客微子來見祖廟也有客有客亦白其馬有萋有且敦琢其旅有客宿宿有客信信言授之縶以縶其馬薄言追之左右綏之既有淫威降福孔夷有客一章十二句武武奏大武也於皇武王無競維烈允文文王克開厥後嗣武受之勝殷遏劉耆定爾功武一章七句臣工之什十篇十章一百六句
