body:
  text: 國風召南第二鵲巢鵲巢夫人之德也國君積行纍功以致爵位夫人起家而居有之德如鳲鳩乃可以配焉維鵲有巢維鳩居之之子于歸百兩御之維鵲有巢維鳩方之之子于歸百兩將之維鵲有巢維鳩盈之之子于歸百兩成之鵲巢三章章四句采蘩采蘩夫人不失職也夫人可以奉祭祀則不失職矣于以采蘩于沼于沚于以用之公侯之事于以采蘩于澗之中于以用之公侯之宮被之僮僮夙夜在公被之祁祁薄言還歸采蘩三章章四句草蟲草蟲大夫妻能以禮自防也喓喓草蟲躍躍阜螽未見君子憂心忡忡亦既見止亦既覯止我心則降陟彼南山言采其蕨未見君子憂心惙惙亦既見止亦既覯止我心則説陟彼南山言采其薇未見君子我心傷悲亦既見止亦既覯止我心則夷草蟲三章章七句采蘋采蘋大夫妻能循法度也能循法度則可以承先祖共祭祀矣于以采蘋南澗之濱于以采藻于彼行潦于以盛之維筐及筥于以湘之維錡及釜于以奠之宗室牖下誰其尸之有齊季女采蘋三章章四句甘棠甘棠美召伯也召伯之教明於南國蔽芾甘棠勿翦勿伐召伯所茇蔽芾甘棠勿翦勿敗召伯所憩蔽芾甘棠勿翦勿拜召伯所説甘棠三章章三句行露行露召伯聽訟也衰亂之俗微貞信之教興強暴之男不能侵陵貞女也厭浥行露豈不夙夜謂行多露誰謂雀無角何以穿我屋誰謂女無家何以速我獄雖速我獄室家不足誰謂鼠無牙何以穿我墉誰謂女無家何以速我訟雖速我訟亦不女從行露三章一章三句二章章六句羔羊羔羊鵲巢之功致也召南之國化文王之政在位皆節儉正直德如羔羊也羔羊之皮素絲五紽退食自公委蛇委蛇羔羊之革素絲五緎委蛇委蛇自公退食羔羊之縫素絲五總委蛇委蛇退食自公羔羊三章章四句殷其靁殷其靁勸以義也召南之大夫遠行從政不遑寧處其室家能閔其勤勞勸以義也殷其靁在南山之陽何斯違斯莫敢或遑振振君子歸哉歸哉殷其靁在南山之陽何斯違斯莫敢或遑振振君子歸哉歸哉殷其靁在南山之側何斯違斯莫敢遑息振振君子歸哉歸哉殷其靁在南山之下何斯違斯莫或遑處振振君子歸哉歸哉殷其靁三章章六句摽有梅摽有梅男女及時也召南之國被文王之化男女得以及時也摽有梅其實七兮求我庶士逮其吉兮摽有梅其實三兮求我庶士逮其今兮摽有梅頃筐塈之求我庶士逮其謂之摽有梅三章章四句小星小星惠及下也夫人無妬忌之行惠及賤妾進御於君知其命有貴賤能盡其心矣嘒彼小星三五在東肅肅宵征夙夜在公實命不同嘒彼小星維參與昴肅肅宵征抱衾與裯實命不猶小星二章章五句江有汜江有汜美媵也勤而無怨嫡能悔過也文王之時江沱之間有嫡不以其媵備數媵遇勞而無怨嫡亦自悔也江有汜之子歸不我以不我以其後也悔江有渚之子歸不我與不我與其後也處江有沱之子歸不我過不我過其嘯也歌江有汜三章章五句野有死麇野有死麇惡無禮也天下大亂強暴相陵遂成淫風被文王之化雖當亂世猶惡無禮也野有死麇白茅苞之有女懷春吉士誘之林有朴樕野有死鹿白茅純束有女如玉舒而脫脫兮無感我帨兮無使尨也吠野有死麇三章二章四句一章三句何彼襛矣何彼襛矣美王姬也雖則王姬亦下嫁於諸侯車服不繫其夫下王后一等猶執婦道以成肅雍之德也何彼襛矣唐棣之華曷不肅雍王姬之車何彼襛矣華如桃李平王之孫齊侯之子其釣維何維絲伊緡齊侯之子平王之孫何彼襛矣三章章四句騶虞騶虞鵲巢之應也鵲巢之化行人倫既正朝廷既治天下純被文王之化則庶類蕃殖搜田以時仁如騶虞則王道成也彼茁者葭一發五豝于嗟乎騶虞彼茁者蓬一發五豵于嗟乎騶虞騶虞二章章三句召南之國十四篇四十章百七十七句
