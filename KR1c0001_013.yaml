body:
  text: 國風檜風第十三羔裘羔裘大夫以道去其君也國小而迫君不用道好潔其衣服逍遙遊燕而不能自強於政治故作是詩也羔裘逍遙狐裘以朝豈不爾思勞心忉忉羔裘翱翔狐裘在堂豈不爾思我心憂傷羔裘如膏日出有曜豈不爾思中心是悼羔裘三章章四句素冠素冠刺不能三年也庶見素冠兮棘人欒欒兮勞心慱慱兮庶見素衣兮我心傷悲兮聊與子同歸兮庶見素韠兮我心蘊結兮聊與子如一兮素冠三章章三句隰有萇楚隰有萇楚疾恣也國人疾其君之淫恣而思無情欲者也隰有萇楚猗儺其枝夭之沃沃樂子之無知隰有萇楚猗儺其華夭之沃沃樂子之無家隰有萇楚猗儺其實夭之沃沃樂子之無室隰有萇楚三章章四句匪風匪風思周道也國小政亂憂及禍難而思周道焉匪風發兮匪車偈兮顧瞻周道中心怛兮匪風飄兮匪車嘌兮顧瞻周道中心弔兮誰能亨魚溉之釜鬵誰將西歸懷之好音匪風三章章四句檜國四篇十二章四十五句
