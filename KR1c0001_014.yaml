body:
  text: 國風曹風第十四蜉蝣蜉蝣刺奢也昭公國小而迫無法以自守好奢而任小人將無所依焉蜉蝣之羽衣裳楚楚心之憂矣於我歸處蜉蝣之翼采采衣服心之憂矣於我歸息蜉蝣掘閲麻衣如雪心之憂矣於我歸說蜉蝣三章章四句候人候人刺近小人也共公遠君子而好近小人焉彼候人兮何戈與祋彼其之子三百赤芾維鵜在梁不濡其翼彼其之子不稱其服維鵜在梁不濡其咮彼其之子不遂其媾薈兮蔚兮南山朝隮婉兮孌兮季女斯飢候人四章章四句鳲鳩鳲鳩刺不一也在位無君子用心之不一也鳲鳩在桑其子七兮淑人君子其儀一兮其儀一兮心如結兮鳲鳩在桑其子在梅淑人君子其帶伊絲其帶伊絲其辨伊騏鳲鳩在桑其子在棘淑人君子其儀不忒其儀不忒正是四國鳲鳩在桑其子在榛淑人君子正是國人正是國人胡不萬年鳲鳩四章章六句下泉下泉思治也曹人疾共公侵刻下民不得其所憂而思明王賢伯也洌彼下泉浸彼苞稂愾我寤嘆念彼周京洌彼下泉浸彼苞蕭愾我寤嘆念彼京周洌彼下泉浸彼苞蓍愾我寤嘆念彼京師芃芃黍苗陰雨膏之四國有王郇伯勞之下泉四章章四句曹國四篇十五章六十八句
