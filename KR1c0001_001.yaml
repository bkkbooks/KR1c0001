body:
  text: 國風周南第一關雎關雎后妃之德也風之始也所以風天下而正夫婦也故用之鄉人焉用之邦國焉風風也教也風以動之教以化之詩者志之所之也在心為志發言為詩情動於中而形於言言之不足故嗟歎之嗟歎之不足故永歌之永歌之不足不知手之舞之足之蹈之也情發於聲聲成文謂之音治世之音安以樂其政和亂世之音怨以怒其政乖亡國之音哀以思其民困故正得失動天地感鬼神莫近於詩先王以是經夫婦成孝敬厚人倫美教化移風俗故詩有六義焉一曰風二曰賦三曰比四曰興五曰雅六曰頌上以風化下下以風刺上主文而譎諫言之者無罪聞之者足以戒故曰風至于王道衰禮義廢政教失國異政家殊俗而變風變雅作矣國史明乎得失之迹傷人倫之廢哀刑政之苛吟詠情性以風其上達於事變而懷其舊俗者也故變風發乎情止乎禮義發乎情民之性也止乎禮義先王之澤也是以一國之事繫一人之本謂之風言天下之事形四方之風謂之雅雅者正也言王政之所由廢興也政有小大故有小雅焉有大雅焉頌者美盛德之形容以其成功告於神明者也是謂四始詩之至也然則關雎麟趾之化王者之風故繫之周公南言化自北而南也鵲巢騶虞之德諸侯之風也先王之所以教故繫之召公周南召南正始之道王化之基是以關雎樂得淑女以配君子憂在進賢不淫其色哀窈窕思賢才而無傷善之心焉是關雎之義也關關雎鳩在河之洲窈窕淑女君子好逑參差荇菜左右流之窈窕淑女寤寐求之求之不得寤寐思服悠哉悠哉輾轉反側參差荇菜左右采之窈窕淑女琴瑟友之參差荇菜左右芼之窈窕淑女鍾鼓樂之關雎五章章四句故言三章一章章四句二章章八句葛覃葛覃后妃之本也后妃在父母家則志在於女功之事躬儉節用服浣濯之衣尊敬師傅則可以歸安父母化天下以婦道也葛之覃兮施于中谷維葉萋萋黃鳥于飛集于灌木其鳴喈喈葛之覃兮施于中谷維葉莫莫是刈是濩為絺為綌服之無斁言告師氏言告言歸薄汙我私薄浣我衣害浣害否歸寧父母葛覃三章章六句卷耳卷耳后妃之志也又當輔佐君子求賢審官知臣下之勤勞內有進賢之志而無險詖私謁之心朝夕思念至於憂勤也采采卷耳不盈頃筐嗟我懷人置彼周行陟彼崔嵬我馬虺隤我姑酌彼金罍維以不永懷陟彼高岡我馬玄黃我姑酌彼兕觥維以不永傷陟彼砠矣我馬瘏矣我僕痡矣云何吁矣卷耳四章章四句樛木樛木后妃逮下也言能逮下而無嫉妬之心焉南有樛木葛藟纍之樂只君子福履綏之南有樛木葛藟荒之樂只君子福履將之南有樛木葛藟縈之樂只君子福履成之樛木三章章四句螽斯螽斯后妃子孫衆多也言若螽斯不妬忌則子孫衆多也螽斯羽詵詵兮宜爾子孫振振兮螽斯羽薨薨兮宜爾子孫繩繩兮螽斯羽揖揖兮宜爾子孫蟄蟄兮螽斯三章章四句桃夭桃夭后妃之所致也不妬忌則男女以正婚姻以時國無鰥民也桃之夭夭灼灼其華之子于歸宜其室家桃之夭夭有蕡其實之子于歸宜其家室桃之夭夭其葉蓁蓁之子于歸宜其家人桃夭三章章四句兔罝兔罝后妃之化也關雎之化行則莫不好德賢人衆多也肅肅兔罝椓之丁丁赳赳武夫公侯干城肅肅兔罝施于中逵赳赳武夫公侯好仇肅肅兔罝施于中林赳赳武夫公侯腹心兔罝三章章四句芣苡芣苡后妃之美也和平則婦人樂有子矣采采芣苡薄言采之采采芣苡薄言有之采采芣苡薄言掇之采采芣苡薄言捋之采采芣苡薄言袺之采采芣苡薄言襭之芣苡三章章四句漢廣漢廣德廣所及也文王之道被于南國美化行乎江漢之域無思犯禮求而不可得也南有喬木不可休息漢有遊女不可求思漢之廣矣不可泳思江之永矣不可方思翹翹錯薪言刈其楚之子于歸言秣其馬漢之廣矣不可泳思江之永矣不可方思翹翹錯薪言刈其蔞之子于歸言秣其駒漢之廣矣不可泳思江之永矣不可方思漢廣三章章八句汝墳汝墳道化行也文王之化行乎汝墳之國婦人能閔其君子猶勉之以正也遵彼汝墳伐其條枚未見君子惄如調飢遵彼汝墳伐其條肄既見君子不我遐棄魴魚赬尾王室如燬雖則如燬父母孔邇汝墳三章章四句麟之趾麟之趾關雎之應也關雎之化行則天下無犯非禮雖衰世之公子皆信厚如麟趾之時也麟之趾振振公子于嗟麟兮麟之定振振公姓于嗟麟兮麟之角振振公族于嗟麟兮麟之趾三章章三句周南之國十一篇三十六章百五十九句
