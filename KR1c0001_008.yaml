body:
  text: 國風齊風第八雞鳴雞鳴思賢妃也哀公荒淫怠慢故陳賢妃貞女夙夜警戒相成之道焉雞既鳴矣朝既盈矣匪雞則鳴蒼蠅之聲東方明矣朝既昌矣匪東方則明月出之光蟲飛薨薨甘與子同夢會且歸矣無庶豫子憎雞鳴三章章四句還還刺荒也哀公好田獵從禽獸而無厭國人化之遂成風俗習於田獵謂之賢間於馳逐謂之好焉子之還兮遭我乎峱之閒兮並驅從兩肩兮揖我謂我儇兮子之茂兮遭我乎峱之道兮並驅從兩牡兮揖我謂我好兮子之昌兮遭我乎峱之陽兮並驅從兩狼兮揖我謂我臧兮還三章章四句著著刺時也時不親迎也俟我於著乎而充耳以素乎而尚之以瓊華乎而俟我於庭乎而充耳以青乎而尚之以瓊瑩乎而俟我於堂乎而充耳以黃乎而尚之以瓊英乎而著三章章三句東方之日東方之日刺衰也君臣失道男女淫奔不能以禮化也東方之日兮彼姝者子在我室兮在我室兮履我即兮東方之月兮彼姝者子在我闥兮在我闥兮履我發兮東方之日二章章五句東方未明東方未明刺無節也朝廷興居無節號令不時挈壺氏不能掌其職焉東方未明顛倒衣裳顛之倒之自公召之東方未晞顛倒裳衣倒之顛之自公令之折柳樊圃狂夫瞿瞿不能辰夜不夙則莫東方未明三章章四句南山南山刺襄公也鳥獸之行淫乎其妹大夫遇是惡作詩而去之南山崔崔雄狐綏綏魯道有蕩齊子由歸既曰歸止曷又懷止葛屨五兩冠緌雙止魯道有蕩齊子庸止既曰庸止曷又從止藝麻如之何衡從其畝取妻如之何必告父母既曰告止曷又鞠止析薪如之何匪斧不克取妻如之何匪媒不得既曰得止曷又極止南山四章章六句甫田甫田大夫刺襄公也無禮義而求大功不修德而求諸侯志大心勞所以求者非其道也無田甫田維莠驕驕無思遠人勞心忉忉無田甫田維莠桀桀無思遠人勞心怛怛婉兮孌兮總角草兮未幾見兮突而辨兮甫田三章章四句盧令盧令刺荒也襄公好田獵畢弋而不修民事百姓苦之故陳古以風焉盧令令其人美且仁盧重環其人美且鬈盧重鋂其人美且偲盧令三章章二句敝笱敝笱刺文姜也齊人惡魯桓公微弱不能防間文姜使至淫亂為二國患焉敝笱在梁其魚魴鰥齊子歸止其從如雲敝笱在梁其魚魴鱮齊子歸止其從如雨敝笱在梁其魚唯唯齊子歸止其從如水敝笱三章章四句載驅載驅齊人刺襄公也無禮義故盛其車服疾驅於通道大都與文姜淫播其惡於萬民焉載驅薄薄簟茀朱鞹魯道有蕩齊子發夕四驪濟濟垂轡濔濔魯道有蕩齊子豈弟汶水湯湯行人彭彭魯道有蕩齊子翱翔汶水滔滔行人儦儦魯道有蕩齊子遊敖載驅四章章四句猗嗟猗嗟刺魯莊公也齊人傷魯莊公有威儀技藝然而不能以禮防間其母失子之道人以為齊侯之子焉猗嗟昌兮頎而長兮抑若揚兮美目揚兮巧趨蹌兮射則臧兮猗嗟名兮美目清兮儀既成兮終日射侯不出正兮展我甥兮猗嗟孌兮清揚婉兮舞則選兮射則貫兮四矢反兮以禦亂兮猗嗟三章章六句齊國十一篇二十四章百四十三句
