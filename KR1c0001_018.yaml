body:
  text: 小雅鴻鴈之什第三鴻鴈鴻鴈美宣王也萬民離散不安其居而能勞來還定安集之至于矜寡無不得其所焉鴻鴈于飛肅肅其羽之子于征劬勞于野爰及矜人哀此鰥寡鴻鴈于飛集于中澤之子于垣百堵皆作雖則劬勞其究安宅鴻鴈于飛哀鳴嗸嗸維此哲人謂我劬勞維彼愚人謂我宣驕鴻鴈三章章六句庭燎庭燎美宣王也因以針之夜如何其夜未央庭燎之光君子至止鸞聲將將夜如何其夜未艾庭燎晣晣君子至止鸞聲噦噦夜如何其夜鄉晨庭燎有輝君子至止言觀其旗庭燎三章章五句沔水沔水規宣王也沔彼流水朝宗于海鴥彼飛隼載飛載止嗟我兄弟邦人諸友莫肯念亂誰無父母沔彼流水其流湯湯鴥彼飛隼載飛載揚念彼不迹載起載行心之憂矣不可弭忘鴥彼飛隼率彼中陵民之訛言寧莫之懲我友敬矣讒言其興沔水三章二章章八句一章六句鶴鳴鶴鳴誨宣王也鶴鳴于九皋聲聞于野魚潛在淵或在于渚樂彼之園爰有樹檀其下維蘀它山之石可以為錯鶴鳴于九皋聲聞于天魚在于渚或潛在淵樂彼之園爰有樹檀其下維榖它山之石可以攻玉鶴鳴二章章九句祈父祈父刺宣王也祈父豫王之爪牙胡轉豫于恤靡所止居祈父豫王之爪士胡轉豫于恤靡所砥止祁父亶不聰胡轉豫于恤有母之尸饔祈父三章章四句白駒白駒大夫刺宣王也皎皎白駒食我場苗縶之維之以永今朝所謂伊人於焉逍遙皎皎白駒食我場藿縶之維之以永今夕所謂伊人於焉嘉客皎皎白駒賁然來思爾公爾侯逸豫無期慎爾優遊勉爾遁思皎皎白駒在彼空谷生芻一束其人如玉毋金玉爾音而有遐心白駒四章章六句黃鳥黃鳥刺宣王也黃鳥黃鳥無集于穀無啄我粟此邦之人不我肯穀言旋言歸復我邦族黃鳥黃鳥無集于桑無啄我粱此邦之人不可與明言旋言歸復我諸兄黃鳥黃鳥無集于栩無啄我黍此邦之人不可與處言旋言歸復我諸父黃鳥三章章七句我行其野我行其野刺宣王也我行其野蔽芾其樗昏姻之故言就爾居爾不我畜復我邦家我行其野言采其蓫昏姻之故言就爾宿爾不我畜言歸斯復我行其野言采其葍不思舊姻求爾新特成不以富亦祗以異我行其野三章章六句斯干斯干宣王考室也秩秩斯干幽幽南山如竹苞矣如松茂矣兄及弟矣式相好矣無相猶矣似續妣祖築室百堵西南其戶爰居爰處爰笑爰語約之閣閣椓之橐橐風雨攸除鳥鼠攸去君子攸芋如跂斯翼如矢斯棘如鳥斯革如翬斯飛君子攸躋殖殖其庭有覺其楹噲噲其正噦噦其冥君子攸寧下莞上簟乃安斯寢乃寢乃興乃占我夢吉夢維何維熊維羆維虺維蛇大人占之維熊維羆男子之祥維虺維蛇女子之祥乃生男子載寢之床載衣之裳載弄之璋其泣喤喤朱芾斯皇室家君王乃生女子載寢之地載衣之裼載弄之瓦無非無儀唯酒食是議無父母詒罹斯干九章四章章七句五章章五句無羊無羊宣王考牧也誰謂爾無羊三百維群誰謂爾無牛九十其犉爾羊來思其角濈濈爾牛來思其耳濕濕或降于阿或飲于池或寢或訛爾牧來思何蓑何笠或負其餱三十維物爾牲則具爾牧來思以薪以蒸以雌以雄爾羊來思矜矜兢兢不騫不崩麾之以肱畢來既升牧人乃夢衆維魚矣旐維旟矣大人占之衆維魚矣實維豐年旐維旟矣室家溱溱無羊四章章八句鴻鴈之什十篇三十二章二百三十句
