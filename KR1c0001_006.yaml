body:
  text: 國風王風第六黍離黍離閔宗周也周大夫行役至于宗周過故宗廟宮室盡為禾黍閔周室之顛覆倣徨不忍去而作是詩也彼黍離離彼稷之苗行邁靡靡中心搖搖知我者謂我心憂不知我者謂我何求悠悠蒼天此何人哉彼黍離離彼稷之穗行邁靡靡中心如醉知我者謂我心憂不知我者謂我何求悠悠蒼天此何人哉彼黍離離彼稷之實行邁靡靡中心如噎知我者謂我心憂不知我者謂我何求悠悠蒼天此何人哉黍離三章章十句君子于役君子于役刺平王也君子行役無期度大夫思其危難以風焉君子于役不知其期曷至哉雞棲于塒日之夕矣羊牛下來君子于役如之何勿思君子于役不日不月曷其有佸雞棲于桀日之夕矣羊牛下括君子于役苟無飢渴君子于役二章章八句君子陽陽君子陽陽閔周也君子遭亂相招為祿仕全身遠害而已君子陽陽左執簧右招我由房其樂只且君子陶陶左執翿右招我由敖其樂只且君子陽陽二章章四句揚之水揚之水刺平王也不撫其民而遠屯戍于母家周人怨思焉揚之水不流束薪彼其之子不與我戍申懷哉懷哉曷月豫還歸哉揚之水不流束楚彼其之子不與我戍甫懷哉懷哉曷月豫還歸哉揚之水不流束蒲彼其之子不與我戍許懷哉懷哉曷月豫還歸哉揚之水三章章六句中谷有蓷中谷有蓷閔周也夫婦日以衰薄凶年飢饉室家相棄爾中谷有蓷暵其乾矣有女仳離慨其嘆矣慨其嘆矣遇人之艱難矣中谷有蓷暵其修矣有女仳離條其嘯矣條其嘯矣遇人之不淑矣中谷有蓷暵其濕矣有女仳離啜其泣矣啜其泣矣何嗟及矣中谷有蓷三章章六句兔爰兔爰閔周也桓王失信諸侯背叛構怨連禍王師傷敗君子不樂其生焉有兔爰爰雉離于羅我生之初尚無為我生之後逢此百罹尚寐無吪有兔爰爰雉離于罦我生之初尚無造我生之後逢此百憂尚寐無覺有兔爰爰雉離于罿我生之初尚無庸我生之後逢此百凶尚寐無聰兔爰三章章七句葛藟葛藟王族刺平王也周室道衰棄其九族焉綿綿葛藟在河之滸終遠兄弟謂他人父謂他人父亦莫我顧綿綿葛藟在河之涘終遠兄弟謂他人母謂他人母亦莫我有綿綿葛藟在河之漘終遠兄弟謂他人昆謂他人昆亦莫我聞葛藟三章章六句采葛采葛懼讒也彼采葛兮一日不見如三月兮彼采蕭兮一日不見如三秋兮彼采艾兮一日不見如三歲兮采葛三章章三句大車大車刺周大夫也禮義陵遲男女淫奔故陳古以刺今大夫不能聽男女之訟焉大車檻檻毳衣如菼豈不爾思畏子不敢大車啍啍毳衣如璊豈不爾思畏子不奔穀則異室死則同穴謂豫不信有如皎日大車三章章四句丘中有麻丘中有麻思賢也莊王不明賢人放逐國人思之而作是詩也丘中有麻彼留子嗟彼留子嗟將其來施施丘中有麥彼留子國彼留子國將其來食丘中有李彼留之子彼留之子貽我佩玖丘中有麻三章章四句王國十篇二十八章百六十二句
