body:
  text: 國風衛風第五淇奧淇奧美武公之德也有文章又能聽其規諫以禮自防故能入相于周美而作是詩也瞻彼淇奧緑竹猗猗有匪君子如切如磋如琢如磨瑟兮僩兮赫兮咺兮有匪君子終不可諼兮瞻彼淇奧緑竹青青有匪君子充耳琇瑩會辨如星瑟兮僩兮赫兮咺兮有匪君子終不可諼兮瞻彼淇奧緑竹如簀有匪君子如金如錫如圭如璧寬兮綽兮猗重較兮善戲謔兮不為虐兮淇奧三章章九句考槃考槃刺莊公也不能繼先公之業使賢者退而窮處考槃在澗碩人之寬獨寐寤言永矢弗諼考槃在阿碩人之薖獨寐寤歌永矢弗過考槃在陸碩人之軸獨寐寤宿永矢弗告考槃三章章四句碩人碩人閔莊薑也莊公惑於嬖妾使驕上僭莊薑賢而不答終以無子國人閔而憂之碩人其頎衣錦褧衣齊侯之子衛侯之妻東宮之妹邢侯之姨談公維私手如柔荑膚如凝脂領如蝤蠐齒如瓠犀螓首蛾眉巧笑倩兮美目盼兮碩人敖敖説于農郊四牡有驕朱幩鑣鑣翟茀以朝大夫夙退無使君勞河水洋洋北流活活施罛濊濊鱣鮪發發葭菼揭揭庶薑孽孽庶士有朅碩人四章章七句氓氓刺時也宣公之時禮義消亡淫風大行男女無別遂相奔誘華落色衰復相棄背或乃困而自悔喪其妃耦故序其事以風焉美反正刺淫泆也氓之蚩蚩抱布貿絲匪來貿絲來即我謀送子涉淇至于頓丘匪我愆期子無良媒將子無怒秋以為期乘彼垝垣以望復關不見復關泣涕漣漣既見復關載笑載言爾卜爾筮體無咎言以爾車來以我賄遷桑之未落其葉沃若于嗟鳩兮無食桑椹于嗟女兮無與士耽士之耽兮猶可説也女之耽兮不可説也桑之落矣其黃而隕自我徂爾三歲食貧淇水湯湯漸車帷裳女也不爽士貣其行士也罔極二三其德三歲為婦靡室勞矣夙興夜寐靡有朝矣言既遂矣至于暴矣兄弟不知嘻其笑矣靜言思之躬自悼矣及爾偕老老使我怨淇則有岸隰則有泮總角之宴言笑晏晏信誓旦旦不思其反反是不思亦已焉哉氓六章章十句竹竿竹竿衛女思歸也適異國而不見答思而能以禮者也籊籊竹竿以釣于淇豈不爾思遠莫致之泉源在左淇水在右女子有行遠兄弟父母淇水在右泉源在左巧笑之瑳佩玉之儺淇水悠悠檜楫松舟駕言出遊以寫我憂竹竿四章章四句芄蘭芄蘭刺惠公也驕而無禮大夫刺之芄蘭之支童子佩觿雖則佩觿能不我知容兮遂兮垂帶悸兮芄蘭之葉童子佩韘雖則佩韘能不我甲容兮遂兮垂帶悸兮芄蘭二章章六句河廣河廣宋襄公母歸于衛思而不止故作是詩也誰謂河廣一葦杭之誰謂宋遠跂豫望之誰謂河廣曾不容刀誰謂宋遠曾不崇朝河廣二章章四句伯兮伯兮刺時也言君子行役為王前驅過時而不反焉伯兮朅兮邦之桀兮伯也執殳為王前驅自伯之東首如飛蓬豈無膏沐誰適為容其雨其雨杲杲出日願言思伯甘心首疾焉得諼草言樹之背願言思伯使我心痗伯兮四章章四句有狐有狐刺時也衛之男女失時喪其妃耦焉古者國有凶荒則殺禮而多昏會男女之無夫家者所以育人民也有狐綏綏在彼淇梁心之憂矣之子無裳有狐綏綏有彼淇厲心之憂矣之子無帶有狐綏綏在彼淇側心之憂矣之子無服有狐三章章四句木瓜木瓜美齊桓公也衛國有狄人之敗出處于漕齊桓公救而封之遺之車馬器服焉衛人思之欲厚報之而作是詩也投我以木瓜報之以瓊琚匪報也永以為好也投我以木桃報之以瓊瑤匪報也永以為好也投我以木李報之以瓊玖匪報也永以為好也木瓜三章章四句衛國十篇三十四章二百三句
